name: Build & Sign hKtweaks APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Linkit Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using stored keystore from secret"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/Linkit.jks"
          else
            echo "Generating fresh Linkit keystore"
            keytool -genkey -v \
              -keystore "$GITHUB_WORKSPACE/Linkit.jks" \
              -alias Linkit \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass Linkit \
              -keypass Linkit \
              -dname "CN=Linkit, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"
          fi
          echo "Keystore ready: $(ls -lh $GITHUB_WORKSPACE/Linkit.jks)"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/Linkit.jks
          KEYSTORE_STORE_PASSWORD: Linkit
          KEYSTORE_ALIAS: Linkit
          KEYSTORE_KEY_PASSWORD: Linkit
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: hKtweaks-signed-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
